{% extends 'base.html' %}
{% block title %}Set New Password — ExamSystem{% endblock %}

{% block extra_css %}
<style>
    body { overflow-x: hidden; }
    .hero { min-height: 100vh; background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #0c0c24 100%); display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(99,102,241,.25), transparent 70%); top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(139,92,246,.2), transparent 70%); bottom: -100px; right: -80px; }
    .reset-card { background: rgba(255,255,255,.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.1); border-radius: 26px; padding: 2.5rem; width: 100%; max-width: 440px; animation: slideUp .5s cubic-bezier(.16,1,.3,1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .form-grp { margin-bottom: 1.1rem; }
    .form-lbl { display: block; font-size: .77rem; color: var(--muted); font-weight: 500; margin-bottom: .38rem; letter-spacing: .04em; }
    .form-inp { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: .85rem 1rem; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: .92rem; outline: none; transition: all .28s; }
    .form-inp:focus { border-color: rgba(99,102,241,.48); box-shadow: 0 0 0 3px rgba(99,102,241,.09); background: rgba(255,255,255,.06); }
    .form-inp::placeholder { color: rgba(255,255,255,.24); }
    .btn-submit { width: 100%; padding: .92rem; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--indigo), var(--violet)); color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; cursor: pointer; transition: all .3s; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(99,102,241,.4); }
    .icon-lg { font-size: 2.5rem; color: var(--green); margin-bottom: 1rem; }
    .inp-wrap { position: relative; }
    .inp-wrap .form-inp { padding-right: 2.8rem; }
    .eye-btn { position: absolute; right: .75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: .9rem; transition: color .2s; }
    .eye-btn:hover { color: var(--white); }
</style>
{% endblock %}

{% block body %}
<div class="hero">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <div class="reset-card">
        <div class="logo-text mb-3">ExamSystem</div>
        <i class="fas fa-lock-open icon-lg"></i>
        <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: .5rem;">Set New Password</h2>
        <p style="color: var(--muted); font-size: .9rem; margin-bottom: 1.8rem; line-height: 1.6;">Create a strong password for your account.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-grp">
                <label class="form-lbl">New Password</label>
                <div class="inp-wrap">
                    <input type="password" id="np1" name="password1" class="form-inp" placeholder="••••••••" required minlength="6">
                    <button type="button" class="eye-btn" onclick="togglePass('np1', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-grp">
                <label class="form-lbl">Confirm Password</label>
                <div class="inp-wrap">
                    <input type="password" id="np2" name="password2" class="form-inp" placeholder="••••••••" required minlength="6">
                    <button type="button" class="eye-btn" onclick="togglePass('np2', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-check me-2"></i>Reset Password</button>
        </form>
    </div>
</div>

<script>
function togglePass(id, btn) {
    const inp = document.getElementById(id);
    const i = btn.querySelector('i');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    i.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
{% endblock %}
