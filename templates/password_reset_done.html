{% extends 'base.html' %}
{% block title %}Password Reset Sent — ExamSystem{% endblock %}

{% block extra_css %}
<style>
    body { overflow-x: hidden; }
    .hero { min-height: 100vh; background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #0c0c24 100%); display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(99,102,241,.25), transparent 70%); top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(139,92,246,.2), transparent 70%); bottom: -100px; right: -80px; }
    .reset-card { background: rgba(255,255,255,.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.1); border-radius: 26px; padding: 2.5rem; width: 100%; max-width: 440px; animation: slideUp .5s cubic-bezier(.16,1,.3,1); text-align: center; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .icon-lg { font-size: 3rem; color: var(--green); margin-bottom: 1rem; }
    .btn-primary { display: inline-block; padding: .85rem 2rem; background: linear-gradient(135deg, var(--indigo), var(--violet)); color: white; border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 700; text-decoration: none; transition: all .3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(99,102,241,.4); }
</style>
{% endblock %}

{% block body %}
<div class="hero">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <div class="reset-card">
        <div class="logo-text mb-3">ExamSystem</div>
        <i class="fas fa-envelope-open-text icon-lg"></i>
        <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: .5rem;">Check Your Email</h2>
        <p style="color: var(--muted); font-size: .9rem; margin-bottom: 1.8rem; line-height: 1.6;">We've sent you instructions to reset your password. Please check your email inbox.</p>
        <a href="{% url 'exams:landing' %}" class="btn-primary"><i class="fas fa-arrow-left me-2"></i>Back to Login</a>
    </div>
</div>
{% endblock %}
